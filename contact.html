<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Riya Rajput</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#0f172a;
    color:white;
}

.gradient{
    background:linear-gradient(135deg,#facc15,#f59e0b);
}
</style>

</head>

<body>

<!-- Navbar -->

<nav class="bg-slate-900 shadow-lg">

<div class="max-w-7xl mx-auto flex justify-between items-center px-8 py-5">

<h1 class="text-3xl font-bold text-yellow-400">
Riya Verma
</h1>

<a href="index.html"
class="text-white hover:text-yellow-400">
← Back Home
</a>

</div>

</nav>

<!-- Contact -->

<section class="min-h-screen flex justify-center items-center py-10 px-8">

<div class="bg-slate-800 rounded-3xl shadow-2xl p-6 max-w-xl w-full">

<h2 class="text-5xl font-bold text-center">

Let's Connect

</h2>

<p class="text-center text-gray-200 mt-3">

Thank you for visiting my travel blog.

If you'd like to share your travel experience, ask a question about my Kedarnath journey, or simply say hello, I'd love to hear from you.

</p>

<form action="mailto:your@email.com"
method="post"
enctype="text/plain"
class="mt-1 space-y-1">

<input
type="text"
name="Name"
placeholder="Your Name"
required
class="w-full p-1 rounded-x1 bg-slate-700">

<input
type="email"
name="Email"
placeholder="Your Email"
required
class="w-full p-1 rounded-x1 bg-slate-700">

<input
type="text"
name="Subject"
placeholder="Subject"
class="w-full p-1 rounded-x1 bg-slate-700">

<textarea
name="Message"
rows="6"
placeholder="Write your message..."
required
class="w-full p-4 rounded-xl bg-slate-700"></textarea>

<button
type="submit"
class="gradient w-full py-1 rounded-xl text-black font-bold hover:scale-30 transition">

📩 Send Message

</button>

</form>

<div class="mt-4 text-center">

<p class="text-gray-400">

Email

</p>

<p class="text-yellow-400 text-lg">

i.riyaverma16@gmail.com

</p>

</div>

</div>

</section>

</body>
</html>
